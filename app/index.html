<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/images/branding/app_icon_1024.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Forest Merge 2048</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #0d2f2e;
      }

      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 25% 18%, rgba(110, 240, 215, 0.22), transparent 45%),
          radial-gradient(circle at 82% 82%, rgba(120, 170, 255, 0.2), transparent 48%),
          #0d2f2e;
        color: #f3f5ef;
        font-family: 'Georgia', 'Garamond', serif;
        transition: opacity 0.24s ease, visibility 0.24s ease;
      }

      #boot-splash.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      #boot-splash .boot-inner {
        width: min(88vw, 420px);
        padding: 24px 18px;
        text-align: center;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(8, 28, 26, 0.5);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
      }

      #boot-splash h1 {
        margin: 0 0 8px;
        font-size: clamp(34px, 8.5vw, 52px);
        line-height: 1.05;
        letter-spacing: 0.4px;
      }

      #boot-splash p {
        margin: 0;
        opacity: 0.72;
        font-size: clamp(16px, 3.7vw, 20px);
      }

      #boot-splash .boot-progress {
        margin: 24px auto 14px;
        width: min(74vw, 320px);
        height: 8px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.35);
        overflow: hidden;
      }

      #boot-splash .boot-progress::before {
        content: '';
        display: block;
        height: 100%;
        width: 46%;
        border-radius: inherit;
        background: linear-gradient(90deg, rgba(130, 228, 170, 0.92), rgba(182, 255, 228, 0.92));
        animation: bootProgress 1.2s ease-in-out infinite alternate;
      }

      #boot-splash .boot-text {
        margin: 0;
        font-size: clamp(18px, 3.8vw, 28px);
        opacity: 0.92;
      }

      @keyframes bootProgress {
        from {
          transform: translateX(-18%);
        }
        to {
          transform: translateX(115%);
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" aria-hidden="true">
      <div class="boot-inner">
        <h1>Forest Merge 2048</h1>
        <p>Image Block Puzzle</p>
        <div class="boot-progress"></div>
        <p class="boot-text">Loading resources...</p>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
